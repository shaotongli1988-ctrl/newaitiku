<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-nav-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface antialiased">
<!-- Top App Bar -->
<header class="sticky top-0 z-50 flex items-center justify-between px-6 h-16 w-full bg-white dark:bg-slate-900 shadow-sm dark:shadow-none">
<div class="flex items-center gap-3">
<button class="text-blue-700 dark:text-blue-400 active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-blue-700 dark:text-blue-400 font-['Manrope'] font-bold text-lg tracking-tight">自由练习</h1>
</div>
<button class="text-blue-700 dark:text-blue-400 active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</header>
<main class="pb-24 px-4 pt-6 space-y-8">
<!-- Stats Section (Asymmetric Bento Lite) -->
<section class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-lowest p-5 rounded-xl flex flex-col justify-between min-h-[120px]">
<div class="flex justify-between items-start">
<span class="text-secondary font-semibold text-xs font-label">今日已练</span>
<span class="material-symbols-outlined text-secondary text-lg" data-icon="history">history</span>
</div>
<div class="mt-2">
<span class="font-headline font-extrabold text-3xl text-on-surface">42</span>
<span class="text-on-surface-variant text-xs ml-1">道题</span>
</div>
</div>
<div class="bg-surface-container-lowest p-5 rounded-xl flex flex-col justify-between min-h-[120px]">
<div class="flex justify-between items-start">
<span class="text-tertiary font-semibold text-xs font-label">平均正确率</span>
<span class="material-symbols-outlined text-tertiary text-lg" data-icon="verified">verified</span>
</div>
<div class="mt-2">
<span class="font-headline font-extrabold text-3xl text-on-surface">86</span>
<span class="text-on-surface-variant text-xs ml-1">%</span>
</div>
</div>
</section>
<!-- Search & Filter Area -->
<section class="space-y-4">
<div class="relative">
<input class="w-full h-12 bg-surface-container-high border-none rounded-md px-12 text-sm focus:ring-2 focus:ring-primary/20 placeholder:text-outline transition-all" placeholder="搜索题目或知识点..." type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
</div>
<!-- Subject Switcher (Pill Aesthetic) -->
<div class="flex overflow-x-auto gap-2 pb-2 no-scrollbar">
<button class="whitespace-nowrap px-6 py-2 bg-primary text-on-primary rounded-full text-sm font-medium shadow-md">全部科目</button>
<button class="whitespace-nowrap px-6 py-2 bg-surface-container-high text-on-surface-variant rounded-full text-sm font-medium hover:bg-surface-container-highest transition-colors">高等数学</button>
<button class="whitespace-nowrap px-6 py-2 bg-surface-container-high text-on-surface-variant rounded-full text-sm font-medium hover:bg-surface-container-highest transition-colors">大学英语</button>
<button class="whitespace-nowrap px-6 py-2 bg-surface-container-high text-on-surface-variant rounded-full text-sm font-medium hover:bg-surface-container-highest transition-colors">计算机基础</button>
</div>
</section>
<!-- Practice Sessions List (The "Breath" Rule) -->
<section class="space-y-5">
<div class="flex items-center justify-between mb-2">
<h2 class="font-headline font-bold text-on-surface text-lg">推荐练习</h2>
<button class="text-primary text-xs font-bold flex items-center gap-1">
                    全部 <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Session Card 1 -->
<div class="group bg-surface-container-lowest p-4 rounded-xl flex items-center justify-between hover:shadow-[0_12_40px_rgba(25,28,30,0.06)] transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-primary-fixed flex items-center justify-center rounded-lg text-primary">
<span class="material-symbols-outlined" data-icon="functions">functions</span>
</div>
<div>
<h3 class="font-bold text-on-surface text-sm">导数与微分强化训练</h3>
<p class="text-on-surface-variant text-[11px] mt-0.5">难度：中等 • 15 题目</p>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-all">
<span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<!-- Session Card 2 -->
<div class="group bg-surface-container-lowest p-4 rounded-xl flex items-center justify-between hover:shadow-[0_12_40px_rgba(25,28,30,0.06)] transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-secondary-fixed flex items-center justify-center rounded-lg text-secondary">
<span class="material-symbols-outlined" data-icon="translate">translate</span>
</div>
<div>
<h3 class="font-bold text-on-surface text-sm">英语核心词汇速记 (2)</h3>
<p class="text-on-surface-variant text-[11px] mt-0.5">难度：简单 • 30 题目</p>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-all">
<span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<!-- Session Card 3 -->
<div class="group bg-surface-container-lowest p-4 rounded-xl flex items-center justify-between hover:shadow-[0_12_40px_rgba(25,28,30,0.06)] transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-tertiary-fixed flex items-center justify-center rounded-lg text-tertiary">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
</div>
<div>
<h3 class="font-bold text-on-surface text-sm">计算机数据结构专项</h3>
<p class="text-on-surface-variant text-[11px] mt-0.5">难度：困难 • 10 题目</p>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-all">
<span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<!-- Session Card 4 -->
<div class="group bg-surface-container-lowest p-4 rounded-xl flex items-center justify-between hover:shadow-[0_12_40px_rgba(25,28,30,0.06)] transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-surface-container-high flex items-center justify-center rounded-lg text-outline">
<span class="material-symbols-outlined" data-icon="school">school</span>
</div>
<div>
<h3 class="font-bold text-on-surface text-sm">历年全真模拟卷 (A)</h3>
<p class="text-on-surface-variant text-[11px] mt-0.5">难度：极高 • 50 题目</p>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-all">
<span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
</section>
<!-- Quick Start FAB (Contextual Action) -->
<button class="fixed bottom-24 right-6 w-14 h-14 rounded-2xl bg-gradient-to-br from-primary to-primary-container text-on-primary shadow-lg flex items-center justify-center active:scale-95 transition-transform z-40">
<span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
</button>

<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-70 hover:opacity-100 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="library_books">library_books</span>
<span class="font-['Inter'] text-[10px] font-semibold mt-1">个人题库</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-70 hover:opacity-100 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="auto_stories">auto_stories</span>
<span class="font-['Inter'] text-[10px] font-semibold mt-1">错题本</span>
</a>
<a class="flex flex-col items-center justify-center text-blue-700 dark:text-blue-400 scale-110 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined text-2xl active-nav-icon" data-icon="quiz">quiz</span>
<span class="font-['Inter'] text-[10px] font-semibold mt-1">自由练习</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-70 hover:opacity-100 active:scale-90 transition-transform duration-150" href="#">
